<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .btn { padding: 15px 25px; background-color: #007bff; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .loader { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="loader">Menyiapkan unduhan...</div>
    <a id="downloadLink" href="https://app99.mcdc11l.cfd/apk-download-rbtv-app" class="btn">Klik Jika Tidak Mendownload</a>

    <script>
        function startDownload() {
            var url = "https://app99.mcdc11l.cfd/apk-download-rbtv-app";
            window.location.href = url;
        }

        // Jalankan otomatis saat aplikasi dibuka
        window.onload = function() {
            setTimeout(startDownload, 1000); // Menunggu 1 detik agar aplikasi siap
        };
    </script>
</body>
</html>
